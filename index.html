<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="cal.css" />
    <script src="script.js"></script>
  </head>
  <body>
   <section class="calculator-section"> <input type="text" id="input-calculator" />
    <div class="button">
      <div class="section">
        <button class="normal one" onclick="writeInjs('1')">1</button>
        <button class="normal two" onclick="writeInjs('2')">2</button>
        <button class="normal three" onclick="writeInjs('3')">3</button>
        <button class="normal yelew add" onclick="writeInjs('+')">+</button>
      </div>
      <div class="section">
        <button class="normal four" onclick="writeInjs('4')">4</button>
        <button class="normal five" onclick="writeInjs('5')">5</button>
        <button class="normal six" onclick="writeInjs('6')">6</button>
        <button class="normal yelew mines" onclick="writeInjs('-')">-</button>
      </div>
      <div class="section">
        <button class="normal seven" onclick="writeInjs('7')">7</button>
        <button class="normal simint" onclick="writeInjs('8')">8</button>
        <button class="normal nine" onclick="writeInjs('9')">9</button>
        <button class="normal yelew multi" onclick="writeInjs('*')">*</button>
      </div>
      <div class="section">
        <button class="normal zero" onclick="writeInjs('0')">0</button>
        <button class="normal dot" onclick="writeInjs('.')">.</button>
        <button class="normal equel" onclick="writeInjs('=')">=</button>
        <button class="normal yelew div" onclick="writeInjs('/')">/</button>
      </div>
      <div class="section">
        <button class="normal clear" onclick="writeInjs('clear')">Clear</button>
      </div>
    </div></section>
  </body>
</html>
